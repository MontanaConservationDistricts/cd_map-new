<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Montana Conservation District Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body { margin: 0; font-family: 'Open Sans', sans-serif; }
  #map { height: 100vh; width: 100%; }
  .popup { display: flex; gap: 10px; max-width: 260px; font-size: 13px; line-height: 1.4; }
  .popup-left { flex: 0 0 70px; }
  .popup-left img { width: 70px; height: auto; border-radius: 4px; object-fit: contain; }
  .popup-right { flex: 1; }
  .popup-right h3 { margin: 0 0 4px; font-size: 15px; color: #1f4e79; }
  .popup a { color: #1f4e79; text-decoration: none; }
  .popup a:hover { text-decoration: underline; }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([46.8, -110.0], 6);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Data URLs
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?output=csv&gid=203628658";

// Load CSV and add markers
fetch(csvUrl)
  .then(r => r.text())
  .then(csvText => {
    const csv = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
    console.log("CSV rows:", csv);

    const latlngs = [];

    csv.forEach(row => {
      if (!row["Lat,Long"]) return;

      const latlng = row["Lat,Long"].split(",").map(Number);
      if (latlng.length !== 2 || isNaN(latlng[0]) || isNaN(latlng[1])) {
        console.warn("Invalid Lat,Long:", row["Lat,Long"]);
        return;
      }

      const popupContent = `
        <div class="popup">
          <div class="popup-left">
            <img src="${row.cd_logo || 'https://via.placeholder.com/70'}">
          </div>
          <div class="popup-right">
            <h3>${row.name}</h3>
            ${row.physical_address ? `<div>${row.physical_address}</div>` : ""}
            ${row.Phone ? `<div><strong>P:</strong> ${row.Phone}</div>` : ""}
            ${row.Email ? `<div><strong>E:</strong> ${row.Email}</div>` : ""}
            ${row.Hours ? `<div><strong>H:</strong> ${row.Hours}</div>` : ""}
            ${row.Website ? `<div><a href="${row.Website}" target="_blank">Website</a></div>` : ""}
            ${row.social_media ? `<div><a href="${row.social_media}" target="_blank">Social</a></div>` : ""}
          </div>
        </div>
      `;

      const marker = L.marker(latlng).addTo(map);
      marker.bindPopup(popupContent);

      latlngs.push(latlng);
    });

    if (latlngs.length > 0) map.fitBounds(latlngs);
  })
  .catch(err => console.error("CSV load error:", err));
</script>
</body>
</html>
