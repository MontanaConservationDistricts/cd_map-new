<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Conservation District Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }

.popup-content { font-size:13px; max-width:260px; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([46.8797, -110.3625], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";

fetch(csvUrl)
.then(r => r.text())
.then(csv => {

  Papa.parse(csv, {
    header: true,
    skipEmptyLines: true,
    complete: (results) => {

      const data = results.data;

      // 🔍 LOG FIRST ROW (IMPORTANT)
      console.log("HEADERS:", Object.keys(data[0]));
      console.log("FIRST ROW:", data[0]);

      data.forEach(row => {

        // =========================
        // NORMALIZE KEYS
        // =========================
        const clean = {};
        Object.keys(row).forEach(k => {
          clean[k.trim().toLowerCase()] = row[k];
        });

        // =========================
        // GET LAT/LNG (SAFE)
        // =========================
        let lat = parseFloat(clean['lat']);
        let lng = parseFloat(clean['long']);

        // FORCE parse if strings have spaces
        if (typeof clean['lat'] === 'string') {
          lat = parseFloat(clean['lat'].trim());
        }
        if (typeof clean['long'] === 'string') {
          lng = parseFloat(clean['long'].trim());
        }

        // DEBUG ONE ROW
        if (!isNaN(lat) && !isNaN(lng)) {
          console.log("VALID:", lat, lng);
        }

        if (
          isNaN(lat) || isNaN(lng) ||
          lat < -90 || lat > 90 ||
          lng < -180 || lng > 180
        ) return;

        // =========================
        // POPUP
        // =========================
        const name = clean['name'] || 'District';

        const html = `<div class="popup-content">
          <b>${name}</b><br>
          ${clean['city'] || ''}
        </div>`;

        L.marker([lat, lng])
          .bindPopup(html)
          .addTo(map);

      });

    }
  });

});
</script>
</body>
</html>
