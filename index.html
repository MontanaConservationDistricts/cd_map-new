<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montana Conservation District Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; }
        #map { width: 100%; height: 100%; }
        .popup-content { font-family: 'Open Sans', sans-serif; font-size: 13px; line-height: 1.5; }
        .popup-content img { width: 70px; height: auto; border-radius: 3px; margin-bottom: 8px; display: block; }
        .popup-content h3 { margin: 0 0 8px 0; color: #1f4e79; font-size: 14px; font-weight: 600; }
        .popup-content div { margin: 5px 0; }
        .popup-content b { color: #333; }
        .popup-content a { color: #1f4e79; text-decoration: none; font-weight: 500; }
        .popup-content a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Initialize Leaflet map
        const map = L.map('map').setView([46.8797, -110.3625], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";
        const geojsonUrl = "./data/district-boundaries_simplified-disable.geojson";
        const backgroundUrl = "./data/MT_background.geojson";

        let bounds = [];

        // Load Background GeoJSON
        fetch(backgroundUrl)
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ccc", weight: 1, fillColor: "#eee", fillOpacity: 1 }
                }).addTo(map);
            })
            .catch(e => console.error('Background:', e));

        // Load Districts GeoJSON
        fetch(geojsonUrl)
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#fff", weight: 1, fillColor: "#2c6da4", fillOpacity: 0.6 },
                    onEachFeature: (f, l) => {
                        l.on('mouseover', () => l.setStyle({ fillOpacity: 0.85, weight: 2 }).bringToFront());
                        l.on('mouseout', () => l.setStyle({ fillOpacity: 0.6, weight: 1 }));
                    }
                }).addTo(map);
            })
            .catch(e => console.error('Districts:', e));

        // Load CSV
        fetch(csvUrl)
            .then(r => r.text())
            .then(csv => {
                Papa.parse(csv, {
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        console.log(`Loaded ${rows.length} rows`);

                        rows.forEach((row, idx) => {
                            if (idx === 0) return; // Skip header

                            try {
                                // Column indices
                                const name = (row[0] || '').trim();
                                const logo = (row[1] || '').trim();
                                // row[2] is broken "area" - SKIP
                                const address = (row[3] || '').trim();
                                const city = (row[4] || '').trim();
                                const state = (row[5] || '').trim();
                                const zip = (row[6] || '').trim();
                                const latlng = (row[7] || '').trim();
                                const hours = (row[8] || '').trim();
                                const phone = (row[9] || '').trim();
                                const email = (row[10] || '').trim();
                                const website = (row[11] || '').trim();
                                const social = (row[12] || '').trim();

                                if (!name || !latlng) return;

                                // Parse coordinates
                                const coords = latlng.split(',').map(s => {
                                    const num = parseFloat(s.trim());
                                    return num;
                                });

                                if (coords.length !== 2 || isNaN(coords[0]) || isNaN(coords[1])) {
                                    console.warn(`${name}: Bad coords: ${latlng}`);
                                    return;
                                }

                                const lat = coords[0];
                                const lng = coords[1];

                                if (lat < 44 || lat > 49 || lng < -117 || lng > -104) {
                                    console.warn(`${name}: Out of Montana bounds: ${lat}, ${lng}`);
                                    return;
                                }

                                // Build address
                                let fullAddr = address;
                                if (city) fullAddr += (fullAddr ? ', ' : '') + city;
                                if (state) fullAddr += (fullAddr ? ', ' : '') + state;
                                if (zip) fullAddr += (fullAddr ? ' ' : '') + zip;

                                // Build popup
                                let html = '<div class="popup-content">';
                                
                                if (logo) {
                                    html += `<img src="${logo}" onerror="this.style.display='none'">`;
                                }
                                
                                html += `<h3>${name}</h3>`;
                                if (fullAddr) html += `<div><b>Address:</b><br>${fullAddr}</div>`;
                                if (phone) html += `<div><b>Phone:</b> <a href="tel:${phone}">${phone}</a></div>`;
                                if (email) html += `<div><b>Email:</b> <a href="mailto:${email}">${email}</a></div>`;
                                if (hours) html += `<div><b>Hours:</b><br>${hours}</div>`;
                                if (website) html += `<div><a href="${website}" target="_blank">Website</a></div>`;
                                if (social) html += `<div><a href="${social}" target="_blank">Social</a></div>`;
                                html += '</div>';

                                // Add marker
                                L.marker([lat, lng]).bindPopup(html).addTo(map);
                                bounds.push([lat, lng]);

                                if (idx === 1) console.log(`✓ ${name} at [${lat}, ${lng}]`);

                            } catch (e) {
                                console.error(`Row ${idx}:`, e.message);
                            }
                        });

                        if (bounds.length > 0) {
                            map.fitBounds(bounds, { padding: [50, 50] });
                            console.log(`✓ Added ${bounds.length} markers`);
                        }
                    }
                });
            })
            .catch(e => console.error('CSV error:', e));
    </script>
</body>
</html>
