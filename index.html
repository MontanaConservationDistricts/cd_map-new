<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Conservation District Map</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
html, body { height: 100%; margin: 0; font-family: 'Open Sans', sans-serif; }
#map { height: 100%; width: 100%; }

.popup-content {
  font-size: 13px;
  max-width: 260px;
}
.popup-content img {
  width: 70px;
  margin-bottom: 8px;
  border-radius: 4px;
}
.popup-content h3 {
  margin: 0 0 4px;
  font-size: 15px;
  color: #1f4e79;
}
.popup-content div { margin-bottom: 4px; }
.popup-content a { color: #1f4e79; text-decoration: none; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([46.8797, -110.3625], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";
const geojsonUrl = "./data/district-boundaries_simplified-disable.geojson";
const backgroundUrl = "./data/MT_background.geojson";

let bounds = [];

// Background
fetch(backgroundUrl)
.then(r => r.json())
.then(data => {
  L.geoJSON(data, {
    style: { color:"#ccc", weight:1, fillColor:"#eee", fillOpacity:1 }
  }).addTo(map);
});

// Districts
fetch(geojsonUrl)
.then(r => r.json())
.then(data => {
  L.geoJSON(data, {
    style: { color:"#fff", weight:1, fillColor:"#2c6da4", fillOpacity:0.6 },
    onEachFeature: (f,l) => {
      l.on('mouseover', () => l.setStyle({ fillOpacity:0.85, weight:2 }));
      l.on('mouseout', () => l.setStyle({ fillOpacity:0.6, weight:1 }));
    }
  }).addTo(map);
});

// CSV
fetch(csvUrl)
.then(r => r.text())
.then(csv => {

  Papa.parse(csv, {
    header: true,
    skipEmptyLines: true,
    complete: (results) => {

      const data = results.data || [];

      data.forEach(row => {

        // =========================
        // FLEXIBLE LAT/LNG PARSER
        // =========================
        let lat = parseFloat(row['Latitude']);
        let lng = parseFloat(row['Longitude']);

        // fallback to various possible names
        if (isNaN(lat) || isNaN(lng)) {
          const possible = [
            row['Lat,Long'],
            row['Lat, Long'],
            row['lat,long'],
            row['lat, long']
          ];

          for (let val of possible) {
            if (val && typeof val === 'string' && val.includes(',')) {
              const parts = val.replace(/"/g,'').trim().split(',');
              if (parts.length === 2) {
                lat = parseFloat(parts[0]);
                lng = parseFloat(parts[1]);
                break;
              }
            }
          }
        }

        // final validation
        if (
          isNaN(lat) || isNaN(lng) ||
          lat < -90 || lat > 90 ||
          lng < -180 || lng > 180
        ) return;

        // force Montana longitude negative if needed
        if (lng > 0) lng = -lng;

        // =========================
        // DATA
        // =========================
        const name = row.name || 'District';
        const logo = row.cd_logo || '';
        const address = row.physical_address || '';
        const city = row.city || '';
        const state = row.state || '';
        const zip = row.zip || '';
        const hours = row.Hours || '';
        const phone = row.Phone || '';
        const email = row.Email || '';
        const website = row.Website || '';
        const social = row.social_media || '';

        let fullAddr = address;
        if (city) fullAddr += (fullAddr ? ', ' : '') + city;
        if (state) fullAddr += (fullAddr ? ', ' : '') + state;
        if (zip) fullAddr += ' ' + zip;

        // =========================
        // POPUP
        // =========================
        let html = '<div class="popup-content">';
        if (logo) html += '<img src="' + logo + '" onerror="this.style.display=\'none\'">';
        html += '<h3>' + name + '</h3>';
        if (fullAddr) html += '<div><b>Address:</b><br>' + fullAddr + '</div>';
        if (phone) html += '<div><b>Phone:</b> <a href="tel:' + phone + '">' + phone + '</a></div>';
        if (email) html += '<div><b>Email:</b> <a href="mailto:' + email + '">' + email + '</a></div>';
        if (hours) html += '<div><b>Hours:</b><br>' + hours + '</div>';
        if (website) html += '<div><a href="' + website + '" target="_blank">Website</a></div>';
        if (social) html += '<div><a href="' + social + '" target="_blank">Social</a></div>';
        html += '</div>';

        L.marker([lat, lng])
          .bindPopup(html)
          .addTo(map);

        bounds.push([lat, lng]);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50] });
      }

    }
  });

});
</script>
</body>
</html>
