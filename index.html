<!-- Montana Conservation District Map -->
<h2>Montana Conservation Districts Map</h2>
<p>Click a district or marker for details.</p>

<div id="map" style="height:600px; width:100%; margin-bottom:30px;"></div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Leaflet JS & PapaParse -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
.popup { display: flex; gap: 10px; max-width: 260px; font-size: 13px; line-height: 1.4; }
.popup-left { flex: 0 0 70px; }
.popup-left img { width: 70px; height: auto; border-radius: 4px; object-fit: contain; }
.popup-right { flex: 1; }
.popup-right h3 { margin: 0 0 4px; font-size: 15px; color: #1f4e79; }
.popup a { color: #1f4e79; text-decoration: none; }
.popup a:hover { text-decoration: underline; }
</style>

<script>
const map = L.map('map').setView([46.8, -110.0], 6);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// URLs
const districtsUrl = "https://raw.githubusercontent.com/montanaconservationdistricts/cd_map-new/main/data/district-boundaries_simplified-disable.geojson";
const backgroundUrl = "https://raw.githubusercontent.com/montanaconservationdistricts/cd_map-new/main/data/MT_background.geojson";
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?output=csv&gid=203628658";

// Load all data
Promise.all([
  fetch(districtsUrl).then(r => r.json()),
  fetch(backgroundUrl).then(r => r.json()),
  fetch(csvUrl).then(r => r.text())
]).then(([districts, background, csvText]) => {

  // Parse CSV with clean headers and values
  const csv = Papa.parse(csvText, {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim().replace(/\s+/g,'_'), // convert spaces/newlines to _
    transform: v => v.trim()
  }).data;

  // Build lookup by normalized name
  const lookup = {};
  csv.forEach(row => {
    if(row.name){
      lookup[row.name.toLowerCase()] = row;
    }
  });

  // Background layer
  L.geoJSON(background, {
    style: { color: "#cccccc", weight: 1, fillColor: "#eeeeee", fillOpacity: 1 }
  }).addTo(map);

  // Polygon layer
  const polygonLayer = L.geoJSON(districts, {
    style: { color: "#1f4e79", weight: 2, fillColor: "#2c6da4", fillOpacity: 0.5 },
    onEachFeature: (feature, layer) => {

      const nameKey = (feature.properties.MACD_NAME || "").toLowerCase().trim();
      const row = lookup[nameKey];

      layer.on({
        mouseover: e => e.target.setStyle({ fillOpacity: 0.8 }),
        mouseout: e => e.target.setStyle({ fillOpacity: 0.5 })
      });

      // Use marker Lat/Long for popup if available
      if(row && row.Lat_Long){
        const latlng = row.Lat_Long.split(',').map(Number);
        const popupContent = `
          <div class="popup">
            <div class="popup-left">
              <img src="${row.cd_logo || 'https://via.placeholder.com/70'}">
            </div>
            <div class="popup-right">
              <h3>${row.name}</h3>
              ${row.physical_address ? `<div>${row.physical_address}</div>` : ""}
              ${row.Hours ? `<div><strong>H:</strong> ${row.Hours}</div>` : ""}
              ${row.Phone ? `<div><strong>P:</strong> ${row.Phone}</div>` : ""}
              ${row.Email ? `<div><strong>E:</strong> ${row.Email}</div>` : ""}
              ${row.Website ? `<div><a href="${row.Website}" target="_blank">Website</a></div>` : ""}
              ${row.social_media ? `<div><a href="${row.social_media}" target="_blank">Social</a></div>` : ""}
            </div>
          </div>
        `;

        layer.on('click', () => {
          L.popup().setLatLng(latlng).setContent(popupContent).openOn(map);
        });
      }
    }
  }).addTo(map);

  // Add markers
  const markerLatLngs = [];
  csv.forEach(row => {
    if(!row.Lat_Long) return;
    const latlng = row.Lat_Long.split(',').map(Number);
    if(latlng.length !== 2 || isNaN(latlng[0]) || isNaN(latlng[1])) return;

    const popupContent = `
      <div class="popup">
        <div class="popup-left">
          <img src="${row.cd_logo || 'https://via.placeholder.com/70'}">
        </div>
        <div class="popup-right">
          <h3>${row.name}</h3>
          ${row.physical_address ? `<div>${row.physical_address}</div>` : ""}
          ${row.Hours ? `<div><strong>H:</strong> ${row.Hours}</div>` : ""}
          ${row.Phone ? `<div><strong>P:</strong> ${row.Phone}</div>` : ""}
          ${row.Email ? `<div><strong>E:</strong> ${row.Email}</div>` : ""}
          ${row.Website ? `<div><a href="${row.Website}" target="_blank">Website</a></div>` : ""}
          ${row.social_media ? `<div><a href="${row.social_media}" target="_blank">Social</a></div>` : ""}
        </div>
      </div>
    `;
    L.marker(latlng).addTo(map).bindPopup(popupContent);
    markerLatLngs.push(latlng);
  });

  // Fit map to all polygons
  map.fitBounds(polygonLayer.getBounds());

}).catch(err => console.error("Load error:", err));
</script>
