<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Conservation District Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }
.popup-content { font-size:13px; max-width:260px; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([46.8797, -110.3625], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";

fetch(csvUrl)
.then(r => r.text())
.then(csv => {

  Papa.parse(csv, {
    header: true,           // Treat first row as header
    skipEmptyLines: true,   // Skip empty rows
    dynamicTyping: true,    // Auto-convert numbers
    complete: (results) => {

      const data = results.data;

      console.log("HEADERS:", Object.keys(data[0]));
      console.log("FIRST ROW:", data[0]);

      data.forEach(row => {

        // Normalize keys & trim
        const clean = {};
        Object.keys(row).forEach(k => {
          if(k) clean[k.trim().toLowerCase()] = row[k]?.toString().trim();
        });

        // Parse lat/lng safely
        const lat = parseFloat(clean['lat']);
        const lng = parseFloat(clean['long']);
        if (isNaN(lat) || isNaN(lng)) return;

        // Build popup content with all relevant info
        const html = `<div class="popup-content">
          <b>${clean['name'] || ''}</b><br>
          ${clean['physical_address'] || ''}<br>
          ${clean['city'] || ''}, ${clean['state'] || ''} ${clean['zip'] || ''}<br>
          ${clean['hours'] || ''}<br>
          ${clean['phone'] || ''}<br>
          ${clean['email'] || ''}<br>
          ${clean['website'] ? `<a href="${clean['website']}" target="_blank">${clean['website']}</a>` : ''}<br>
          ${clean['social_media'] || ''}
        </div>`;

        L.marker([lat, lng])
          .bindPopup(html)
          .addTo(map);

      });

    }
  });

});
</script>
</body>
</html>
