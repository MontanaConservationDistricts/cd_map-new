<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Conservation District Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }
.popup-content { font-size:13px; max-width:260px; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// =========================
// Initialize map
// =========================
const map = L.map('map').setView([46.8797, -110.3625], 6);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// =========================
// Load GeoJSON layer (your background / district boundaries)
// =========================
const geojsonUrl = './data/district-boundaries_simplified-disable.geojson'; // adjust path
fetch(geojsonUrl)
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      style: { color: '#2a9d8f', weight: 2, fillOpacity: 0.1 }
    }).addTo(map);
  });

// =========================
// Load CSV markers
// =========================
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";

fetch(csvUrl)
  .then(r => r.text())
  .then(csv => {

    Papa.parse(csv, {
      header: true,             // First row = header
      skipEmptyLines: true,     // Ignore empty rows
      transform: value => value ? value.trim() : '', // Trim spaces
      complete: (results) => {

        const data = results.data;

        data.forEach(row => {

          // Normalize keys
          const clean = {};
          Object.keys(row).forEach(k => {
            if (k) clean[k.trim().toLowerCase()] = row[k] ? row[k].trim() : '';
          });

          // Parse lat/lng
          const lat = parseFloat(clean['lat']);
          const lng = parseFloat(clean['long']);
          if (isNaN(lat) || isNaN(lng)) return; // skip invalid

          // Build popup from full row
          const html = `<div class="popup-content">
            <b>${clean['name'] || ''}</b><br>
            ${clean['cd_logo'] ? `<img src="${clean['cd_logo']}" alt="${clean['name']}" style="max-width:100px;"><br>` : ''}
            ${clean['physical_address'] || ''}<br>
            ${clean['city'] || ''}, ${clean['state'] || ''} ${clean['zip'] || ''}<br>
            ${clean['hours'] || ''}<br>
            ${clean['phone'] || ''}<br>
            ${clean['email'] ? `<a href="mailto:${clean['email']}">${clean['email']}</a>` : ''}<br>
            ${clean['website'] ? `<a href="${clean['website']}" target="_blank">${clean['website']}</a>` : ''}<br>
            ${clean['social_media'] || ''}
          </div>`;

          // Add marker
          L.marker([lat, lng])
            .bindPopup(html)
            .addTo(map);

        });

      }
    });

  });
</script>
</body>
</html>
