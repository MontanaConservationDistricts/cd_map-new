<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montana Conservation District Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }
.popup-content { font-size:13px; max-width:260px; }
.popup-content img { max-width:120px; height:auto; display:block; margin-bottom:5px; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// =========================
// Initialize map
// =========================
const map = L.map('map').setView([46.8797, -110.3625], 6);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// =========================
// GeoJSON (optional)
// =========================
fetch('./data/district-boundaries_simplified-disable.geojson')
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      style: { color: '#2a9d8f', weight: 2, fillOpacity: 0.1 }
    }).addTo(map);
  })
  .catch(() => console.log("GeoJSON not loaded (optional)"));

// =========================
// CSV markers
// =========================
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv&t=" + Date.now();

fetch(csvUrl)
  .then(r => r.text())
  .then(csv => {

    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,

      // CLEAN ALL VALUES (fixes quotes + spaces)
      transform: value => {
        if (!value) return '';
        return value.trim().replace(/^"+|"+$/g, '');
      },

      complete: (results) => {

        const data = results.data;

        console.log("HEADERS:", Object.keys(data[0]));
        console.log("FIRST ROW:", data[0]);

        data.forEach(row => {

          // Normalize keys
          const clean = {};
          Object.keys(row).forEach(k => {
            if (k) clean[k.trim().toLowerCase()] = row[k] ? row[k].trim() : '';
          });

          // =========================
          // Parse lat/lng
          // =========================
          let lat = clean['lat']?.replace(',', '') || '';
          let lng = clean['long']?.replace(',', '') || '';

          lat = parseFloat(lat);
          lng = parseFloat(lng);

          if (isNaN(lat) || isNaN(lng)) return;

          // =========================
          // FIX IMAGE URL (UPDATED)
          // =========================
          let logo = clean['cd_logo'] || '';

          // Convert Google Drive links automatically
          const match = logo.match(/\/d\/(.*?)\//);
          if (match) {
            logo = `https://drive.google.com/uc?export=view&id=${match[1]}`;
          }
console.log("IMAGE DEBUG:", clean['cd_logo'], "→", logo);
          // Base URL for GitHub Pages
const baseUrl = "https://montanaconservationdistricts.github.io/cd_map-new/";

if (logo && !logo.startsWith('http')) {
  logo = baseUrl + logo.replace(/^\/+/, '');
}

          // =========================
          // Build popup
          // =========================
          const html = `
            <div class="popup-content">
              <b>${clean['name'] || ''}</b><br>

              ${logo ? `
                <img src="${logo}" 
                     onerror="console.log('BROKEN IMAGE:', this.src); this.style.display='none';">
              ` : ''}

              ${clean['physical_address'] || ''}<br>
              ${clean['city'] || ''}, ${clean['state'] || ''} ${clean['zip'] || ''}<br>
              ${clean['hours'] || ''}<br>
              ${clean['phone'] || ''}<br>

              ${clean['email'] ? `<a href="mailto:${clean['email']}">${clean['email']}</a><br>` : ''}
              ${clean['website'] ? `<a href="${clean['website']}" target="_blank">Website</a><br>` : ''}

              ${clean['social_media'] || ''}
            </div>
          `;

          // =========================
          // Add marker
          // =========================
          L.marker([lat, lng])
            .bindPopup(html)
            .addTo(map);

        });

      }
    });

  })
  .catch(err => console.error("CSV LOAD ERROR:", err));
</script>
</body>
</html>
