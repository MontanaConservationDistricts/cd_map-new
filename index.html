<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montana Conservation District Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; }
        #map { width: 100%; height: 100%; }
        .popup-content { font-family: 'Open Sans', sans-serif; font-size: 13px; line-height: 1.5; }
        .popup-content img { width: 70px; height: auto; border-radius: 3px; margin-bottom: 8px; display: block; }
        .popup-content h3 { margin: 0 0 8px 0; color: #1f4e79; font-size: 14px; font-weight: 600; }
        .popup-content div { margin: 5px 0; }
        .popup-content b { color: #333; }
        .popup-content a { color: #1f4e79; text-decoration: none; font-weight: 500; }
        .popup-content a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Initialize Leaflet map
        const map = L.map('map').setView([46.8797, -110.3625], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // URLs
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOhw-AhzNOE7w-1Fc82Lxew_OVewMp-wz3aMLF137YZWDegmqtMh1QtrExCVyjl2_73LNTzqSVRG_Y/pub?gid=203628658&single=true&output=csv";
        const geojsonUrl = "./data/district-boundaries_simplified-disable.geojson";
        const backgroundUrl = "./data/MT_background.geojson";

        let bounds = [];

        // Load Background GeoJSON
        fetch(backgroundUrl)
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ccc", weight: 1, fillColor: "#eee", fillOpacity: 1 }
                }).addTo(map);
            })
            .catch(e => console.error('Background error:', e));

        // Load District GeoJSON
        fetch(geojsonUrl)
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#fff", weight: 1, fillColor: "#2c6da4", fillOpacity: 0.6 },
                    onEachFeature: (f, l) => {
                        l.on('mouseover', () => l.setStyle({ fillOpacity: 0.85, weight: 2 }).bringToFront());
                        l.on('mouseout', () => l.setStyle({ fillOpacity: 0.6, weight: 1 }));
                    }
                }).addTo(map);
            })
            .catch(e => console.error('Districts error:', e));

        // Load CSV - SKIP THE BROKEN "area" COLUMN
        fetch(csvUrl)
            .then(r => r.text())
            .then(csv => {
                // Remove the problematic "area" column header and its data
                // The area column appears to have quotes and newlines breaking the CSV
                const lines = csv.split('\n');
                const header = lines[0];
                
                // Remove the "area" column (appears to be between cd_logo and physical_address)
                // Split by comma but be careful with quoted fields
                const cleanedHeader = header
                    .replace(/"area\s*"/g, '') // Remove the quoted "area" with possible newline
                    .replace(/,,/g, ',');       // Remove double commas left behind
                
                // Rebuild CSV with cleaned header
                const cleanedCsv = [cleanedHeader, ...lines.slice(1)].join('\n');
                
                console.log('Original header:', header);
                console.log('Cleaned header:', cleanedHeader);
                
                Papa.parse(cleanedCsv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const data = results.data || [];
                        console.log(`Loaded ${data.length} rows from CSV`);
                        
                        // Log column names to verify
                        if (data.length > 0) {
                            console.log('Columns:', Object.keys(data[0]));
                            console.log('First row:', data[0]);
                        }

                        data.forEach((row, idx) => {
                            try {
                                // Get coordinates
                                let latlng = row['Lat,Long'] || row['lat,long'];
                                if (!latlng) {
                                    console.warn(`Row ${idx}: No Lat,Long found`);
                                    return;
                                }

                                // Parse coordinates
                                const parts = latlng.trim().split(',').map(s => parseFloat(s.trim()));
                                if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
                                    console.warn(`Row ${idx}: Invalid coords: ${latlng}`);
                                    return;
                                }

                                const lat = parts[0];
                                const lng = parts[1];

                                if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                                    console.warn(`Row ${idx}: Out of bounds: ${lat}, ${lng}`);
                                    return;
                                }

                                // Get fields (case-insensitive)
                                const name = (row.name || row.Name || '').trim() || 'District';
                                const logo = (row.cd_logo || row.cd_logo || '').trim();
                                const address = (row.physical_address || row.Physical_address || '').trim();
                                const city = (row.city || row.City || '').trim();
                                const state = (row.state || row.State || '').trim();
                                const zip = (row.zip || row.Zip || '').trim();
                                const hours = (row.Hours || row.hours || '').trim();
                                const phone = (row.Phone || row.phone || '').trim();
                                const email = (row.Email || row.email || '').trim();
                                const website = (row.Website || row.website || '').trim();
                                const social = (row.social_media || row.Social_media || '').trim();

                                // Build full address
                                let fullAddress = address;
                                if (city) fullAddress += (fullAddress ? ', ' : '') + city;
                                if (state) fullAddress += (fullAddress ? ', ' : '') + state;
                                if (zip) fullAddress += (fullAddress ? ' ' : '') + zip;

                                // Build popup HTML
                                let html = '<div class="popup-content">';
                                
                                if (logo) {
                                    html += `<img src="${logo}" alt="Logo" onerror="this.style.display='none'">`;
                                }
                                
                                html += `<h3>${name}</h3>`;
                                
                                if (fullAddress) html += `<div><b>Address:</b><br>${fullAddress}</div>`;
                                if (phone) html += `<div><b>Phone:</b> <a href="tel:${phone}">${phone}</a></div>`;
                                if (email) html += `<div><b>Email:</b> <a href="mailto:${email}">${email}</a></div>`;
                                if (hours) html += `<div><b>Hours:</b><br>${hours}</div>`;
                                if (website) html += `<div><a href="${website}" target="_blank" rel="noopener">🌐 Website</a></div>`;
                                if (social) html += `<div><a href="${social}" target="_blank" rel="noopener">📱 Social Media</a></div>`;
                                
                                html += '</div>';

                                // Add marker
                                L.marker([lat, lng]).bindPopup(html).addTo(map);
                                bounds.push([lat, lng]);

                                if (idx === 0) {
                                    console.log(`✓ First marker: ${name} at [${lat}, ${lng}]`);
                                }

                            } catch (e) {
                                console.error(`Row ${idx} error:`, e.message);
                            }
                        });

                        // Fit map to all markers
                        if (bounds.length > 0) {
                            map.fitBounds(bounds, { padding: [50, 50] });
                            console.log(`✓ Successfully added ${bounds.length} markers`);
                        } else {
                            console.warn('❌ No markers added');
                        }
                    },
                    error: (err) => {
                        console.error('Papa Parse error:', err);
                    }
                });
            })
            .catch(e => console.error('CSV fetch error:', e));
    </script>
</body>
</html>
